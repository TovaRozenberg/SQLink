<div class="login-container">
  <h2>התחברות למערכת</h2>

  <form [formGroup] ="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>אימייל:</label>
      <input type="email" formControlName="email" placeholder="enter@email.com">
      <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        אימייל לא תקין
      </small>
    </div>

    <div class="form-group">
      <label>סיסמה:</label>
      <input type="password" formControlName="password" placeholder="סיסמה">
    </div>

    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

    <button type="submit" [disabled]="loginForm.invalid">התחבר</button>
      <div class="auth-footer">
  <p>עדיין אין לך חשבון? <a routerLink="/register">הירשם כאן</a></p>
</div>
  </form>

</div>
